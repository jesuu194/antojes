<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pruebas API Antojess</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 30px; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .section { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .section h2 { color: #333; margin-bottom: 15px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        input, button, select, textarea { 
            margin: 8px 0; 
            width: 100%; 
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            background: #667eea;
            color: white;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }
        button:hover { background: #5568d3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .endpoints-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 8px;
        }
        .endpoints-grid button {
            font-size: 11px;
            padding: 8px;
            white-space: pre-wrap;
        }
        .output { 
            white-space: pre-wrap; 
            background: #f5f5f5; 
            padding: 12px; 
            border: 1px solid #ddd;
            border-radius: 4px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 13px;
            font-family: 'Courier New', monospace;
        }
        .doc-content {
            font-size: 13px;
            line-height: 1.6;
        }
        .doc-content h3 { color: #667eea; margin: 10px 0 5px 0; }
        .doc-content p { margin: 8px 0; }
        .doc-content pre {
            background: white;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            border: 1px solid #ddd;
            margin: 8px 0;
        }
        .doc-content strong { color: #333; }
        .right-panel { display: flex; flex-direction: column; gap: 20px; }
        @media (max-width: 1200px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🚀 Interfaz de Prueba - API Chat Geolocalizado</h1>
    
    <div class="main-grid">
        <!-- LEFT: CONTROLS -->
        <div>
            <div class="section">
                <h2>⚙️ Configuración</h2>
                <label>Base URL:</label>
                <input id="baseUrl" type="text" value="https://chat-geo-antojes-api.onrender.com/api" />
                <label>API Key:</label>
                <input id="apiKey" type="text" value="test-api-key" />
                <label>Token (Bearer):</label>
                <input id="token" type="text" placeholder="se autorellena al hacer login" />
            </div>

            <div class="section">
                <h2>🔐 Login</h2>
                <label>Email:</label><input id="loginEmail" type="text" value="user1@example.com" />
                <label>Password:</label><input id="loginPwd" type="password" value="password" />
                <button onclick="callEndpoint('POST','/login', getLoginBody(), getLoginDoc())">Login</button>
            </div>

            <div class="section">
                <h2>📡 Endpoints</h2>
                <div class="endpoints-grid" id="endpoints"></div>
            </div>
        </div>

        <!-- RIGHT: DOCS + RESULTS -->
        <div class="right-panel">
            <div class="section">
                <h2>📖 Documentación</h2>
                <div id="doc" class="doc-content"></div>
            </div>

            <div class="section">
                <h2>📊 Resultado</h2>
                <div id="result" class="output"></div>
            </div>
        </div>
    </div>
</div>

<script>
let generalChatId = null;

const apiSections = [
    { name:'Home', method:'GET', path:'/home', doc:`<h3>🏠 GET /api/home</h3>` },
    { name:'General', method:'GET', path:'/general', doc:`<h3>📢 GET /api/general</h3>` },
    { name:'Usuarios', method:'GET', path:'/usuarios', doc:`<h3>👥 GET /api/usuarios</h3>` },
    { name:'Mi usuario', method:'GET', path:'/usuarios/me', doc:`<h3>🔐 GET /api/usuarios/me</h3>` },
    { name:'Crear usuario', method:'POST', path:'/usuarios', body:{name:'Nuevo Usuario',email:'nuevo@example.com',password:'password123'}, doc:`<h3>➕ POST /api/usuarios</h3>` },
    { name:'Actualizar mi usuario', method:'PUT', path:'/usuarios/me', body:{name:'Usuario Modificado'}, doc:`<h3>✏️ PUT /api/usuarios/me</h3>` },
    { name:'Enviar mensaje general', method:'POST', path:'/mensaje?chat_id=1', body:{text:'Hola a todos desde el test!'}, doc:`<h3>💬 POST /api/mensaje</h3>` },
    { name:'Seguir otro', method:'POST', path:'/seguir', body:{user_id:null}, doc:`<h3>⭐ POST /api/seguir</h3>` },
    { name:'Bloquear otro', method:'POST', path:'/bloquear', body:{user_id:null}, doc:`<h3>🚫 POST /api/bloquear</h3>` },
    { name:'Invitar otro', method:'POST', path:'/invitar', body:{user_id:null}, doc:`<h3>📧 POST /api/invitar</h3>` },
    { name:'Privado', method:'GET', path:'/privado', doc:`<h3>🔒 GET /api/privado</h3>` },
    { name:'Actualizar ubicación', method:'POST', path:'/actualizar', body:{lat:40.7128,lng:-74.0060}, doc:`<h3>📍 POST /api/actualizar</h3>` },
    { name:'Perfil', method:'GET', path:'/perfil', doc:`<h3>👤 GET /api/perfil</h3>` },
    { name:'Solicitar amistad', method:'POST', path:'/amistad/solicitar', body:{user_id:null}, doc:`<h3>🤝 POST /api/amistad/solicitar</h3>` },
    { name:'Pendientes', method:'GET', path:'/amistad/pendientes', doc:`<h3>⏳ GET /api/amistad/pendientes</h3>` },
    { name:'Logout', method:'POST', path:'/logout', body:{}, doc:`<h3>🚪 POST /api/logout</h3>` }
];

function buildControls() {
    const container = document.getElementById('endpoints');
    apiSections.forEach(sec=>{
        const btn = document.createElement('button');
        btn.textContent = sec.name;
        btn.disabled = true;
        btn.onclick = ()=>callEndpoint(sec.method, sec.path, sec.body, sec.doc);
        btn.id = 'btn-' + sec.name.replace(/\s+/g,'_');
        container.appendChild(btn);
    });
}

function getLoginBody(){
    return {email: document.getElementById('loginEmail').value, password: document.getElementById('loginPwd').value};
}

function getLoginDoc(){
    return `<h3>🔐 POST /api/login</h3>`;
}

async function callEndpoint(method, path, body=null, doc=null) {
    const baseUrl = document.getElementById('baseUrl').value;
    const apiKey = document.getElementById('apiKey').value;
    let token = document.getElementById('token').value;
    
    if(doc) document.getElementById('doc').innerHTML = doc;
    
    let url = baseUrl + path;
    let opts = {method, headers:{'X-API-KEY':apiKey,'Content-Type':'application/json'}};
    if(token) opts.headers['Authorization']='Bearer '+token;
    
    if(body) opts.body = JSON.stringify(body);
    
    try {
        const resp = await fetch(url, opts);
        const text = await resp.text();
        document.getElementById('result').innerText = text;
        if(path==='/login' && resp.ok){
            const js = JSON.parse(text);
            document.getElementById('token').value = js.token;
            enableButtons();
        }
    } catch(e){
        document.getElementById('result').innerHTML = '<strong style="color:red;">Error:</strong> '+e.message;
    }
}

buildControls();

window.addEventListener('load', () => {
    const fixed = {email:'user1@example.com', password:'password'};
    document.getElementById('loginEmail').value = fixed.email;
    document.getElementById('loginPwd').value = fixed.password;
    callEndpoint('POST', '/login', fixed, getLoginDoc());
});

function enableButtons() {
    apiSections.forEach(sec=>{
        const btn = document.getElementById('btn-' + sec.name.replace(/\s+/g,'_'));
        if(btn) btn.disabled = false;
    });
}
</script>

</body>
</html>
